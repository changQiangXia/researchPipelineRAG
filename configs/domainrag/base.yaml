# First-milestone local settings for the scaffolded DomainRAG benchmark.
# This keeps execution on the example dataset with mocked/no-RAG methods only.

dataset:
  path: data/example_domain

runner:
  split: dev
  methods:
    - no_rag
    - mock_rag
  validate_before_run: true

output:
  root_dir: outputs
  report_dir: reports/example_domain

retrieval:
  enabled: false

model:
  provider: mock
  name: local-noop
